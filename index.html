<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Credit Card Fraud Check</h2>
        <form id="fraudForm">
            <div class="input-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" placeholder="Enter 16-digit card number" required maxlength="16">
            </div>
            <div class="input-group">
                <label for="amount">Transaction Amount ($)</label>
                <input type="number" id="amount" placeholder="e.g., 500" required>
            </div>
            <button type="submit">Analyze Transaction</button>
        </form>
        <div id="result" class="hidden">
            <p id="statusText"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
